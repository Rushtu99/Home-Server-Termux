pid ./runtime/nginx.pid;
error_log ./logs/error.log warn;

events {
    worker_connections 1024;
}

http {
    access_log ./logs/access.log;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    proxy_connect_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8088;
        server_name _;
        set $dashboard_frame_ancestors "frame-ancestors 'self' http://$host:3000 http://$host:8088 http://127.0.0.1:3000 http://localhost:3000 http://127.0.0.1:8088 http://localhost:8088";

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location = /_auth {
            internal;
            proxy_pass http://127.0.0.1:4000/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
        }

        location @auth_401 {
            add_header Cache-Control "no-store" always;
            return 401;
        }

        # --- Dashboard (Next.js) ---
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- API (Express) ---
        location /api/ {
            proxy_pass http://127.0.0.1:4000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Filebrowser (Embedded) ---
        location /files/ {
            auth_request /_auth;
            error_page 401 = @auth_401;

            proxy_pass http://127.0.0.1:8080;
            proxy_redirect off;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy $dashboard_frame_ancestors always;
        }

        location /term/ {
            auth_request /_auth;
            error_page 401 = @auth_401;

            proxy_pass http://127.0.0.1:7681/;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy $dashboard_frame_ancestors always;
        }
    }
}
