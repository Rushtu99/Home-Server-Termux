name: Dashboard Build Checks

on:
  push:
    paths:
      - "dashboard/**"
      - ".github/workflows/test-dashboard.yml"
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/test-dashboard.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Run production build
        run: npm run build
