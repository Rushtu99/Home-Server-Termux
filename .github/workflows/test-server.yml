name: Server Unit Tests

on:
  push:
    paths:
      - "server/**"
      - "scripts/**"
      - "start.sh"
      - "start-wsl.sh"
      - "nginx.conf"
      - "server/.env.example"
      - ".github/workflows/test-server.yml"
  pull_request:
    paths:
      - "server/**"
      - "scripts/**"
      - "start.sh"
      - "start-wsl.sh"
      - "nginx.conf"
      - "server/.env.example"
      - ".github/workflows/test-server.yml"
  workflow_dispatch:

jobs:
  runtime_and_server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run unit tests
        working-directory: server
        run: npm test

      - name: Run coverage gate
        working-directory: server
        run: npm run test:coverage

      - name: Run runtime-core static checks
        run: |
          mkdir -p logs runtime
          npm --prefix server run check
          bash -n start.sh
          bash -n start-wsl.sh
          for script in scripts/*.sh; do
            bash -n "$script"
          done
          nginx -t -p "$PWD" -c "$PWD/nginx.conf"
