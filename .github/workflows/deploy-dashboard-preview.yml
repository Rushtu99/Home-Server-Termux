name: Publish Dashboard Demo

on:
  push:
    branches:
      - main
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard-preview.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard deps
        run: npm ci
        working-directory: dashboard

      - name: Build static demo from real frontend
        run: npm run build:demo
        working-directory: dashboard

      - name: Prepare export
        run: touch dashboard/out/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard/out
          force_orphan: true
